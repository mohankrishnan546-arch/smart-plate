services:
  - type: web
    name: nutrivision-api
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nutrivision-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: nutrivision-db
    databaseName: nutrivision
    plan: free
