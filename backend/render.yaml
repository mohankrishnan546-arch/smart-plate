services:
  - type: web
    name: smartplate-api
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartplate-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: smartplate-db
    databaseName: smartplate
    plan: free
